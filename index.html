<script>
const DATA = {"course": {"title": "Biodiversidad y Sostenibilidad Real en Airbus", "subtitle": "Curso digital · Airbus", "intro": "Recorrido formativo sobre aviación, clima, biodiversidad, geointeligencia, sistema alimentario, colaboración interna y prevención del greenwashing. El curso combina teoría, aplicación práctica y evaluación breve para facilitar una comprensión sólida y útil.", "structure": ["Teoría desarrollada por bloques temáticos.", "Caso o dinámica aplicada por módulo.", "Autoevaluación breve con feedback técnico.", "Cierre orientado a criterio y aplicación real."]}, "modules": [{"id": "m1", "index": "01", "title": "La Intersección entre la Aviación, el Clima y la Naturaleza", "objective": "Comprender por qué la protección de la naturaleza deja de ser un gesto periférico y pasa a ser una condición de resiliencia operativa, trazabilidad de cadena de suministro y supervivencia industrial.", "duration": "120–140 min", "tag": "Riesgo sistémico", "theme": {"ink": "#15202b", "panel": "#fbf7f0", "soft": "#efe5d8", "line": "#c99a5b", "accent": "#30495c"}, "hero": "images/m1/m1-hero.jpg", "support": "images/m1/m1-apoyo.jpg", "case": "images/m1/m1-caso.jpg", "openingTitle": "1. Introducción: El Cambio de Paradigma: De \"Carbono\" a \"Naturaleza\"", "openingParagraphs": ["Históricamente, la sostenibilidad en el sector aeroespacial se ha entendido como un reto de ingeniería centrado en un solo factor: el carbono (CO2). El objetivo era claro: quemar menos combustible para emitir menos gases de efecto invernadero. Sin embargo, este enfoque \"carbono-céntrico\" es incompleto.", "Airbus está adoptando un nuevo paradigma de Sostenibilidad Sistémica. Reconocemos que el clima es solo una parte de un sistema mucho más grande llamado Biosfera. La biodiversidad (la variedad de vida en la Tierra y cómo interactúa) es el \"sistema operativo\" de nuestro planeta. Sin una biodiversidad saludable, los mecanismos naturales que regulan el clima fallan, lo que invalida cualquier esfuerzo tecnológico por alcanzar el Net Zero. En este módulo, aprenderemos que proteger la naturaleza no es un acto de filantropía, sino una estrategia esencial para la Resiliencia Operativa de Airbus."], "sections": [{"kicker": "Capítulo", "title": "2. CAPÍTULO 1.1: El Marco Científico: ¿Cómo funciona el Sistema Tierra?", "paragraphs": []}, {"kicker": "1.1.1", "title": "1.1.1: Servicios Ecosistémicos: La Infraestructura Invisible de Airbus", "paragraphs": ["Para un profesional de la aviación, la infraestructura son las pistas, los hangares y los satélites. Para el planeta, la infraestructura son los Servicios Ecosistémicos: los beneficios que la naturaleza nos da de forma gratuita y sin los cuales Airbus no podría operar.", "1. Servicios de Regulación: Los bosques y océanos absorben el 50% de nuestras emisiones de CO2. Son \"sumideros de carbono\" naturales. Si la biodiversidad de estos bosques se degrada (por incendios, plagas o deforestación), el CO2 se queda en la atmósfera, el calentamiento se acelera y las condiciones de vuelo se vuelven más peligrosas y costosas.", "2. Servicios de Provisión: La naturaleza nos suministra materiales físicos. El agua dulce para el tratamiento de superficies en nuestras plantas y, fundamentalmente, materiales biológicos como el caucho natural.", "3. Servicios de Soporte: Procesos como el ciclo de los nutrientes y la formación de suelo que mantienen la estabilidad económica de las regiones donde Airbus tiene sus sedes y clientes."], "figureSrc": "images/m1/m1-apoyo.jpg", "figureLabel": "Infraestructura invisible"}, {"kicker": "1.1.2", "title": "1.1.2: Los 9 Límites Planetarios: El \"Flight Envelope\" Global", "paragraphs": ["Para que un empleado de Airbus entienda la urgencia, debemos hablar del concepto de Límites Planetarios (Planetary Boundaries). Este marco fue creado en 2009 por el Stockholm Resilience Centre para definir los umbrales que la humanidad no debe cruzar si quiere mantener la estabilidad de la Tierra.", "Imagina que la Tierra tiene una \"Envolvente de Vuelo\" (Flight Envelope). Si el avión se sale de ella, entra en una situación de pérdida (stall) o fallo estructural. Los científicos han identificado 9 límites que actúan como nuestros indicadores de vuelo:", "1. Cambio Climático: Mide la concentración de CO2. (Superado).", "2. Integridad de la Biosfera (Biodiversidad): Mide la extinción de especies. Es el límite más crítico. (Severamente Superado).", "3. Cambio de Uso del Suelo: Conversión de bosques en granjas. (Superado).", "4. Uso del Agua Dulce: Alteración de ríos y acuíferos. (Superado).", "5. Flujos Biogeoquímicos: Exceso de nitrógeno y fósforo en el agua. (Superado).", "6. Nuevas Entidades: Contaminación por plásticos, químicos y materiales sintéticos. (Superado).", "7. Acidificación de los Océanos: El mar se vuelve ácido al absorber CO2, matando el coral.", "8. Agotamiento de la Capa de Ozono: El único límite que estamos logrando recuperar.", "9. Carga de Aerosoles Atmosféricos: Partículas de polvo y humo que afectan al clima.", "¿Por qué es vital para Airbus? Porque ya hemos cruzado 6 de los 9 límites. Esto significa que estamos operando en \"aire turbulento\". La transgresión de estos límites genera una imprevisibilidad climática y de recursos que destruye la planificación financiera y logística de cualquier empresa industrial."], "figureSrc": "images/m1/m1-apoyo.jpg", "figureLabel": "Límites planetarios"}, {"kicker": "1.1.3", "title": "1.1.3: El Desafío del Ciclo de Vida y el Alcance 3 (Scope 3)", "paragraphs": ["El Análisis de Ciclo de Vida (LCA) busca medir el impacto de un Airbus A350 desde que el mineral está en la mina hasta que el avión se desguaza.", "* El Reto del Alcance 3: Aquí es donde enfrentamos nuestra mayor dificultad. El Alcance 3 incluye los impactos de nuestra cadena de suministro (proveedores) y del uso del producto por parte de las aerolíneas.", "* La Realidad de las Auditorías: Airbus tiene miles de proveedores. Obtener datos reales de una mina de bauxita en Guinea o de un fabricante de componentes en Asia es extremadamente difícil. Actualmente, dependemos de estimaciones porque muchos proveedores no tienen capacidad de reporte. Esto es un punto crítico en nuestras auditorías externas: la falta de visibilidad total de los impactos de nuestros proveedores (Nivel 2 y 3) es un riesgo legal que Airbus debe resolver urgentemente mediante una mayor colaboración y exigencia técnica en los contratos de compra."]}, {"kicker": "Capítulo", "title": "3. CAPÍTULO 1.2: Riesgos Estratégicos y Dependencias Críticas", "paragraphs": []}, {"kicker": "1.2.1", "title": "1.2.1: El Caso del Caucho Natural: Una Dependencia Biológica de Alto Riesgo", "paragraphs": ["Muchos empleados se preguntan: \"¿Por qué una empresa que hace aviones de fibra de carbono depende de un árbol?\". La respuesta está en la física extrema del aterrizaje.", "¿Por qué es insustituible? Un avión como el A380 toca tierra a 250 km/h pesando cientos de toneladas. En ese segundo, los neumáticos sufren una deformación brutal y el calor generado es inmenso.", "* El caucho sintético (derivado del petróleo) es excelente para coches, pero en un avión se sobrecalienta y se desintegra.", "* Solo el poliisopreno natural (del árbol Hevea brasiliensis) tiene la propiedad de cristalización por deformación: se vuelve más fuerte justo cuando se estira y disipa el calor de forma única. Sin caucho natural, los neumáticos estallarían en cada aterrizaje.", "* El Riesgo Sistémico (El hongo SALB): El 90% del caucho mundial viene del Sudeste Asiático, pero los árboles son todos clones. Son genéticamente idénticos. Existe un hongo en Sudamérica llamado Microcyclus ulei (Tizón de la hoja). Si una sola espora de este hongo llega a Asia (en la maleta de un turista o en una caja), podría matar todos los árboles de caucho del continente en meses.", "* Referencia Real: Este hongo ya destruyó las plantaciones de Ford en Brasil en los años 30.", " * Impacto en Airbus: Si el suministro de caucho falla, no podemos entregar aviones. Los aviones estarían terminados en la pista, pero sin neumáticos certificados para volar. Es un riesgo de \"punto de parada\" para toda la industria."], "figureSrc": "images/m1/m1-caso.jpg", "figureLabel": "Dependencia crítica del caucho"}, {"kicker": "1.2.2", "title": "1.2.2: El Nuevo Marco Legal: CSRD y TNFD", "paragraphs": ["Si nunca has oído estas siglas, es porque son nuevas, pero van a cambiar tu forma de trabajar. Son leyes y marcos que obligan a Airbus a decir la verdad sobre su impacto natural.", "1. CSRD (Corporate Sustainability Reporting Directive): Es una ley europea obligatoria. Obliga a Airbus a presentar informes de sostenibilidad que son auditados igual que nuestras cuentas bancarias. Introduce la Doble Materialidad:", "* Materialidad de Impacto: Lo que Airbus le hace a la naturaleza.", "* Materialidad Financiera: Lo que la naturaleza le hace a Airbus (ej. si una inundación cierra una fábrica).", "2. TNFD (Taskforce on Nature-related Financial Disclosures): Es un marco global que los inversores y bancos usan para decidir si Airbus es una empresa segura para invertir. Si no podemos demostrar que gestionamos nuestros riesgos de biodiversidad, el dinero para financiar nuevos proyectos de aviones será mucho más caro o inexistente."]}, {"kicker": "1.2.3", "title": "1.2.3: Gobernanza: Riesgos y Oportunidades", "paragraphs": ["Riesgos de una Mala Gestión:", "* Riesgo de Transición: Que las leyes cambien tan rápido que no podamos adaptar nuestras fábricas a tiempo, sufriendo multas millonarias.", "* Riesgo Reputacional: Perder la confianza de los clientes y, sobre todo, de los empleados. El orgullo de pertenencia cae si la empresa es percibida como destructora de la naturaleza.", "Oportunidades Estratégicas:", "* Atracción de Talento: El 67% de los jóvenes ingenieros eligen empresas con una estrategia de sostenibilidad real. En un mercado de talento tan competitivo, ser líderes en protección de la biosfera es nuestra mejor herramienta de reclutamiento.", "* Innovación y Ecodiseño: Entender la naturaleza nos lleva a la Biomímesis (copiar diseños de la naturaleza para hacer alas más eficientes) y a la Manufactura Aditiva (3D) para dejar de desperdiciar materiales caros y escasos."]}, {"kicker": "Resumen", "title": "4. Resumen y Conclusión del Módulo", "paragraphs": ["Este módulo nos ha enseñado que Airbus no es solo una empresa de máquinas, sino una empresa que depende de sistemas biológicos. Comprender los Límites Planetarios, gestionar la dependencia del caucho y cumplir con la CSRD no son tareas extras; son la base de nuestra supervivencia como líderes aeroespaciales. La biodiversidad es el seguro de vida de nuestra cadena de suministro."]}]}, {"id": "m2", "index": "02", "title": "Geointeligencia: La Tecnología Espacial de Airbus como Protectora de la Biosfera", "objective": "En este módulo, exploraremos cómo nuestros satélites se han convertido en los biosensores más potentes del planeta.", "duration": "110–130 min", "tag": "Capacidad tecnológica", "theme": {"ink": "#141c28", "panel": "#f7f4ee", "soft": "#dfeaf1", "line": "#6d90aa", "accent": "#1f3f5b"}, "hero": "images/m2/m2-hero.jpg", "support": "images/m2/m2-apoyo.jpg", "case": "images/m2/m2-caso.jpg", "openingTitle": "1. Introducción: De la Vigilancia Estratégica a la Protección Planetaria", "openingParagraphs": ["Históricamente, la observación de la Tierra desde el espacio nació con fines militares y de inteligencia estatal. Sin embargo, en el contexto de la crisis ecológica actual, la división de Airbus Defence and Space ha reorientado su capacidad tecnológica para abordar el mayor desafío de nuestra era: la falta de datos objetivos sobre el estado de la naturaleza.", "La geointeligencia no es solo tomar fotografías desde el espacio; es la capacidad de procesar, analizar y validar información geoespacial para tomar decisiones críticas. Para Airbus, esto significa proporcionar a gobiernos y corporaciones la \"Única Fuente de Verdad\" (Single Source of Truth) para combatir el greenwashing, detener la deforestación y proteger la integridad de los ecosistemas globales. En este módulo, exploraremos cómo nuestros satélites se han convertido en los biosensores más potentes del planeta."], "sections": [{"kicker": "Capítulo", "title": "2. CAPÍTULO 2.1: Los Ojos de la Tierra: Sensores de Nueva Generación", "paragraphs": []}, {"kicker": "2.1.1", "title": "2.1.1: Óptica de Ultra-Alta Resolución (El detalle que salva especies)", "paragraphs": ["Para gestionar la biodiversidad de forma efectiva, la resolución de la imagen es el factor determinante entre una suposición y una evidencia legal. En el pasado, los satélites de baja resolución solo permitían ver \"manchas verdes\" (bosque) o \"manchas marrones\" (tala). Airbus ha roto esta barrera técnica.", "La Constelación Pléiades Neo: El nuevo estándar de 30 cm", "Airbus opera la constelación más avanzada de su clase: Pléiades Neo. Compuesta por cuatro satélites idénticos, esta red ofrece una resolución nativa de 30 centímetros. Mientras que satélites públicos como Sentinel-2 ven el mundo en píxeles de 10 metros, Pléiades Neo puede ver objetos del tamaño de un plato desde el espacio.", "* Identificación de Especies e Inventario Forestal: A 30 cm de resolución, la geointeligencia permite realizar inventarios forestales sin necesidad de equipos humanos sobre el terreno en zonas peligrosas o inaccesibles. Es posible identificar especies arbóreas individuales mediante el análisis de la arquitectura de la canopia (la forma de la copa) y su firma espectral.", "* Evaluación de la Salud de la Canopia: Mediante bandas espectrales específicas (como el \"Deep Blue\" y el \"Red Edge\"), los satélites detectan el estrés hídrico o enfermedades en los árboles antes de que sean visibles al ojo humano, permitiendo actuar contra plagas que podrían devastar hábitats enteros.", "* Ejemplo Real: Airbus colabora con la ONG Madagasikara Voakajy en Madagascar. Utilizando imágenes de alta resolución, se monitorean los fragmentos de bosque remanentes para proteger el hábitat de especies en peligro crítico como los lémures. La capacidad de ver senderos de apenas un metro permite detectar la intrusión humana en santuarios protegidos."], "figureSrc": "images/m2/m2-apoyo.jpg", "figureLabel": "Óptica de ultra-alta resolución"}, {"kicker": "2.1.2", "title": "2.1.2: Prevención de la Degradación: Detener la \"Deforestación Invisible\"", "paragraphs": ["Es crucial no confundir \"deforestación\" con \"degradación forestal\". La deforestación es la eliminación total de un bosque. La degradación forestal, sin embargo, es la eliminación selectiva de los árboles más valiosos (ej. Caoba o Teca) manteniendo el resto de la cubierta vegetal intacta.", "* La Detección de la Tala Selectiva: Desde satélites de baja resolución, un bosque degradado sigue pareciendo \"verde\". Sin embargo, Pléiades Neo detecta las \"brechas\" de luz que quedan cuando se extrae un solo árbol gigante y los caminos de arrastre de troncos (log landings) que suelen tener menos de 3 metros de ancho.", "* Intervención Legal Preventiva: Detectar la extracción selectiva permite a las autoridades intervenir cuando el daño es aún reversible. Airbus proporciona estos datos como evidencia auditable en juicios contra la tala ilegal.", "* Caso de Uso: El Servicio Starling: Desarrollado por Airbus con Earthworm Foundation, es utilizado por multinacionales como Nestlé o Ferrero para demostrar que sus proveedores no han degradado áreas protegidas. El sistema genera alertas automáticas basadas en la comparación de imágenes de ultra-alta resolución, eliminando el fraude documental."], "figureSrc": "images/m2/m2-caso.jpg", "figureLabel": "Deforestación invisible"}, {"kicker": "2.1.3", "title": "2.1.3: Visión Radar (SAR): El Escudo contra la \"Ceguera\" Ambiental", "paragraphs": ["Las regiones de mayor biodiversidad (Congo, Amazonía) están cubiertas por nubes más de 250 días al año. Aquí, el Radar de Apertura Sintética (SAR) de Airbus es indispensable.", "* ¿Qué es el Radar SAR? Es un sensor activo que emite sus propios pulsos de microondas y mide el rebote. Ve a través de nubes densas, humo, ceniza volcánica y en oscuridad total.", "* TerraSAR-X y TanDEM-X: Estos satélites gemelos vuelan en formación precisa (interferometría) para crear mapas 3D del terreno (WorldDEM) con precisión milimétrica.", "* Medición de Biomasa: El radar penetra parcialmente en el follaje, midiendo el volumen de los troncos. Esto permite \"pesar\" los bosques y calcular el carbono almacenado, algo vital para los acuerdos climáticos internacionales.", "* Referencia: Airbus es el contratista principal de la misión Biomass de la ESA, diseñada para realizar un inventario 3D del carbono forestal global."], "figureSrc": "images/m2/m2-hero.jpg", "figureLabel": "Visión radar SAR"}, {"kicker": "Capítulo", "title": "3. CAPÍTULO 2.2: Alianzas Globales y el Programa Copernicus", "paragraphs": ["Airbus es un pilar del programa Copernicus, la iniciativa de la UE y la ESA para la observación de la Tierra."]}, {"kicker": "2.2.1", "title": "2.2.1: CAMS y C3S: Monitoreo de la Atmósfera y el Clima", "paragraphs": ["* CAMS (Atmosphere Monitoring): Airbus fabrica instrumentos para las misiones Sentinel-4 y 5, rastreando contaminantes (  ,   ) e incendios forestales. En 2023, permitió rastrear el humo de los incendios de Canadá cruzando el Atlántico.", "* C3S (Climate Change): Proporciona datos sobre el aumento del nivel del mar (Sentinel-6) y humedad del suelo. Airbus Protect utiliza estos datos para realizar evaluaciones de riesgo en aeropuertos, diseñando defensas naturales contra inundaciones."], "figureSrc": "images/m2/m2-apoyo.jpg", "figureLabel": "Monitoreo atmosférico y climático"}, {"kicker": "2.2.2", "title": "2.2.2: Colaboración con la UICN: Verificación de la Restauración", "paragraphs": ["Airbus proporciona el MRV (Monitoreo, Reporte y Verificación) independiente para proyectos de reforestación.", "* Supervivencia de Plantones: Con 30 cm de resolución, verificamos individualmente si los árboles plantados sobreviven los primeros 24 meses.", "* Ejemplo Real: Restauración de la Mata Atlántica en Brasil, conectando fragmentos de bosque para asegurar la diversidad genética de la fauna."], "figureSrc": "images/m2/m2-caso.jpg", "figureLabel": "Verificación de restauración"}, {"kicker": "Capítulo", "title": "4. CAPÍTULO 2.3: Casos de Aplicación e Impacto Real", "paragraphs": []}, {"kicker": "2.3.1", "title": "2.3.1: Vigilancia de \"Buques Oscuros\" (Protección Oceánica)", "paragraphs": ["Los barcos ilegales apagan su sistema de identificación (AIS) para saquear santuarios marinos.", "* La Solución Airbus: Cruzamos el eco físico detectado por el radar (TerraSAR-X) con las señales AIS. Si el radar detecta un barco donde no hay señal AIS, es un \"buque oscuro\". Programamos un satélite óptico para identificar su matrícula y aparejos, colaborando con Global Fishing Watch."], "figureSrc": "images/m2/m2-hero.jpg", "figureLabel": "Protección oceánica"}, {"kicker": "2.3.2", "title": "2.3.2: Premios \"Satellites for Biodiversity\"", "paragraphs": ["Apoyamos a científicos para monitorear hábitats de chimpancés y proteger al oso andino en condiciones extremas."]}, {"kicker": "Capítulo", "title": "5. CAPÍTULO 2.4: El Futuro: NEXT SPACE y Protección Planetaria", "paragraphs": []}, {"kicker": "2.4.1", "title": "2.4.1: Sostenibilidad Espacial y Basura Espacial", "paragraphs": ["Diseñamos satélites bajo el Ecodiseño Espacial para que se desintegren al final de su vida útil y participamos en misiones CleanSpace de limpieza orbital."]}, {"kicker": "2.4.2", "title": "2.4.2: Comité de Protección Planetaria (CoPP)", "paragraphs": ["Cumplimos los protocolos del COSPAR para evitar la contaminación biológica:", "1. Contaminación Directa: Evitar llevar microbios terrestres a otros mundos (ej. misión JUICE a Júpiter).", "2. Contaminación Inversa: Sellado de muestras de otros planetas para proteger la biosfera terrestre (misión Mars Sample Return)."]}, {"kicker": "Fuentes", "title": "Listado de Fuentes y Referencias: Módulo 2 Airbus", "paragraphs": []}, {"kicker": "1", "title": "1. Documentación Primaria (Airbus)", "paragraphs": ["* Airbus Defence and Space (2024): Geointelligence: Space Technology as a Protector of the Biosphere. Informe técnico sobre el uso de constelaciones satelitales para el monitoreo ambiental.", "* Airbus Intelligence (2024): Pléiades Neo: Technical Specifications and User Guide. Detalles sobre la resolución de 30 cm y bandas espectrales.", "* Airbus Protect (2024): Climate Risk Assessment for Infrastructure. Metodologías de uso de datos climáticos para la resiliencia de activos.", "* Airbus Internal Document: Next Space Initiative: Sustainable Exploration and Planetary Protection.", "* Airbus Committee on Planetary Protection (CoPP): Manual de Procedimientos y Cumplimiento de Protocolos COSPAR."]}, {"kicker": "2", "title": "2. Programas e Instituciones Internacionales", "paragraphs": ["* Copernicus Programme (ESA / Comisión Europea):", "* CAMS (Copernicus Atmosphere Monitoring Service): Datos sobre emisiones de aerosoles, incendios forestales y calidad del aire.", "* C3S (Copernicus Climate Change Service): Indicadores de variables climáticas esenciales (ECV) y modelos de predicción.", "* ESA (Agencia Espacial Europea): * Misión Biomass (P-band SAR): Datos técnicos sobre la medición de biomasa forestal desde el espacio.", "* Sentinel-6 Michael Freilich: Documentación sobre la medición del nivel del mar.", "* UICN (Unión Internacional para la Conservación de la Naturaleza):", "* Restoration Barometer: Metodología para la verificación de compromisos de restauración de tierras (Desafío de Bonn).", "* ECMWF (European Centre for Medium-Range Weather Forecasts): Datos de soporte para los servicios de Copernicus."]}, {"kicker": "3", "title": "3. Marcos Científicos y Regulatorios", "paragraphs": ["* COSPAR (Committee on Space Research): Policy on Planetary Protection. Estándares internacionales para evitar la contaminación biológica en misiones espaciales.", "* Stockholm Resilience Centre: Planetary Boundaries Framework (2009/2023). Definición científica de los límites de estabilidad de la biosfera.", "* ISO 14040 / 14044: Estándares internacionales para la Evaluación de Ciclo de Vida (LCA) aplicados a la fabricación de satélites y aeronaves.", "* MDPI Encyclopedia: Life Cycle Assessment in Aviation. Revisión de impactos ambientales en la industria aeroespacial."]}, {"kicker": "4", "title": "4. Casos de Uso y Aplicaciones Técnicas", "paragraphs": ["* Earthworm Foundation: Metodología del servicio Starling para el monitoreo de la deforestación en cadenas de suministro de materias primas (aceite de palma, soja, cacao).", "* Global Fishing Watch: The Dark Vessel Detection Project. Informes sobre el cruce de datos AIS y Radar SAR para combatir la pesca ilegal (IUU).", "* Madagasikara Voakajy: Estudios de caso sobre el uso de imágenes Pléiades para la protección del hábitat de lémures en Madagascar.", "* Connected Conservation Foundation: Reportes de los ganadores del premio Satellites for Biodiversity (casos del oso andino y chimpancés)."]}, {"kicker": "5", "title": "5. Referencias de Misiones Específicas", "paragraphs": ["* Misión JUICE (JUpiter ICy moons Explorer): Protocolos de limpieza y esterilización para la exploración de lunas heladas.", "* Misión TerraSAR-X & TanDEM-X: Fundamentos de la interferometría SAR y generación del WorldDEM (Modelo Digital de Elevación).", "* Misión Mars Sample Return (MSR): Diseño del Earth Return Orbiter y protocolos de seguridad para la contención de muestras biológicas (Contaminación Inversa)."]}]}, {"id": "m3", "index": "03", "title": "Sistemas Alimentarios y la Crisis de Biodiversidad: El Reto de la Ocupación del Suelo", "objective": "No se trata solo de un tema de nutrición, sino del mayor desafío de optimización de recursos (suelo y agua) que enfrenta la humanidad.", "duration": "110–130 min", "tag": "Eficiencia espacial", "theme": {"ink": "#20180f", "panel": "#fcf7ef", "soft": "#f2dfc5", "line": "#bb7d31", "accent": "#6d4a1d"}, "hero": "images/m3/m3-hero.jpg", "support": "images/m3/m3-apoyo.jpg", "case": "images/m3/m3-caso.jpg", "openingTitle": "1. Introducción: La Alimentación como Gestión de Recursos Globales", "openingParagraphs": ["La comprensión técnica de la crisis ecológica global a menudo omite factores críticos al centrarse casi exclusivamente en las emisiones directas de carbono derivadas de la industria y el transporte. No obstante, el consenso científico internacional es unánime: el sistema alimentario global es el principal motor de la pérdida de biodiversidad en el planeta. No se trata solo de un tema de nutrición, sino del mayor desafío de optimización de recursos (suelo y agua) que enfrenta la humanidad.", "Para Airbus, entender este sistema es vital por tres razones:", "Resiliencia de la Cadena de Suministro: La competencia por el suelo afecta la disponibilidad de biomasa y recursos para la industria.", "Salud y Productividad: El bienestar de nuestra fuerza laboral depende de sistemas alimentarios resilientes y saludables.", "Mitigación de Riesgos Físicos: La expansión agrícola descontrolada destruye los ecosistemas que actúan como defensas naturales de nuestras infraestructuras."], "sections": [{"kicker": "Capítulo", "title": "2. CAPÍTULO 3.1: El Sistema Alimentario como Motor de Degradación Global", "paragraphs": []}, {"kicker": "3.1.1", "title": "3.1.1: El Impacto en la Biosfera y el Uso de la Tierra", "paragraphs": ["La agricultura representa la transformación antrópica más masiva de la superficie terrestre. La evidencia científica acumulada por organismos como la IPBES confirma que el sistema alimentario actual es la mayor amenaza para la integridad de la biosfera debido a la ocupación masiva de suelo.", "A. El Factor de Extinción (El 86% de las especies)", "La expansión de la frontera agrícola es la causa número uno de la pérdida de biodiversidad. De las especies en alto riesgo de extinción, la agricultura es una amenaza directa para el 86% de ellas.", "Mecanismo de impacto: La conversión de ecosistemas en monocultivos genera fragmentación: los parches de naturaleza quedan aislados, impidiendo el flujo genético y la supervivencia a largo plazo (Newbold et al., 2015).", "B. El Límite de Cambio de Uso de Suelo", "La agricultura utiliza el 50% de la tierra habitable del planeta. Según el marco del Stockholm Resilience Centre, hemos superado el umbral de seguridad de conversión de tierras, entrando en una zona de alto riesgo donde el planeta pierde su capacidad de autorregulación climática (Steffen et al., 2015).", "C. Estrés Hídrico y Eutrofización", "El sistema alimentario es responsable del 70% de las extracciones de agua dulce global. El uso excesivo de fertilizantes provoca la eutrofización, creando \"zonas muertas\" en océanos y lagos por falta de oxígeno. Para Airbus, esto se traduce en riesgos de escasez de agua en regiones industriales críticas como India o el sur de Europa."], "figureSrc": "images/m3/m3-apoyo.jpg", "figureLabel": "Impacto en la biosfera y uso de la tierra"}, {"kicker": "3.1.2", "title": "3.1.2: El \"Paradigma de la Comida Barata\" y la Pérdida de Agrobiodiversidad", "paragraphs": ["El modelo actual prioriza el rendimiento inmediato sobre la resiliencia, creando un sistema homogéneo y frágil.", "Erosión Genética: Se ha perdido el 75% de la diversidad genética de los cultivos desde 1900 (FAO, 2019).", "El Cuello de Botella: Solo 9 cultivos representan el 66% de la producción mundial. Esta homogeneización aumenta el riesgo de colapsos sistémicos ante plagas o eventos climáticos extremos.", "Conexión Estratégica: Es el mismo riesgo sistémico analizado en el Módulo 1 con el caucho natural: la dependencia de una base biológica estrecha invita al desastre operativo."], "figureSrc": "images/m3/m3-caso.jpg", "figureLabel": "Agrobiodiversidad y resiliencia"}, {"kicker": "Capítulo", "title": "3. CAPÍTULO 3.2: Eficiencia Espacial y el \"Dividendo de la Tierra\"", "paragraphs": []}, {"kicker": "3.2.1", "title": "3.2.1: Análisis de Eficiencia en la Ocupación del Suelo", "paragraphs": ["Desde una perspectiva de gestión de activos y optimización de recursos, el sistema alimentario actual presenta un fallo crítico en la asignación de superficie. El problema no es lo que comemos, sino cuánta tierra bloqueamos para obtener un resultado mínimo.", "La Ineficiencia de la Pirámide Trófica: En términos de ingeniería de recursos, cada nivel intermedio en una cadena de suministro consume energía. En la naturaleza, al pasar de plantas a animales, se pierde el 90% de la energía.", "Desequilibrio en la Huella Espacial: Actualmente, el 77% de toda la superficie agrícola mundial se dedica a la ganadería (pastos y cultivos para pienso).", "Coste de Oportunidad Sistémico: Debido a esta ineficiencia espacial, estamos dedicando el 80% de la tierra disponible a un modelo que solo cubre una pequeña fracción de la demanda global (Poore & Nemecek, 2018). Para una empresa como Airbus, esto es un error de asignación de recursos: estamos ocupando el suelo que el planeta necesita para sus \"infraestructuras de defensa\" (bosques y sumideros de carbono).", "Presión sobre la Frontera Agrícola: Esta alta demanda de suelo para alimentar animales es lo que empuja la deforestación de selvas vírgenes. Necesitamos una cantidad de terreno desproporcionada para mantener el modelo actual, lo que elimina cualquier posibilidad de liberar espacio para la restauración climática."], "figureSrc": "images/m3/m3-hero.jpg", "figureLabel": "Eficiencia en la ocupación del suelo"}, {"kicker": "3.2.2", "title": "3.2.2: La Transición \"Plant-Forward\" como Herramienta de Optimización", "paragraphs": ["El concepto Plant-Forward se entiende aquí como una métrica de Eficiencia Espacial.", "Impacto Espacial: Si optimizamos el sistema hacia el consumo directo de cultivos, el uso de tierra agrícola mundial podría reducirse en un 75%.", "El Dividendo de la Tierra: El espacio liberado (equivalente a la suma de EE.UU., China, la UE y Australia) permitiría la restauración masiva de ecosistemas. Esta es la única \"tecnología\" capaz de absorber carbono a la escala necesaria para que industrias difíciles de descarbonizar, como la aviación, operen en un entorno climáticamente estable."], "figureSrc": "images/m3/m3-caso.jpg", "figureLabel": "Dividendo de la tierra"}, {"kicker": "Capítulo", "title": "4. CAPÍTULO 3.3: Resiliencia Estratégica y Valor del Capital Natural", "paragraphs": ["La integración de la biodiversidad y la eficiencia del suelo no es solo una cuestión ética, sino una salvaguarda financiera para las operaciones de Airbus a largo plazo."]}, {"kicker": "3.3.1", "title": "3.3.1: Mitigación de Riesgos Físicos en Infraestructuras de Airbus", "paragraphs": ["La degradación de los ecosistemas locales debido a la expansión agrícola incontrolada aumenta la vulnerabilidad de nuestros activos físicos. La transición de infraestructuras \"grises\" (hormigón) a soluciones basadas en la naturaleza representa un cambio crítico en nuestra ingeniería civil.", "Protección contra Inundaciones: El Efecto Esponja", "Contexto Histórico: Durante el siglo XX, la respuesta industrial a las inundaciones fue la canalización y el uso de diques de hormigón. Sin embargo, eventos climáticos extremos demostraron que estas estructuras suelen fallar al desplazar el problema aguas abajo.", "Justificación Científica: La restauración de humedales y bosques riparios alrededor de las plantas actúa como una infraestructura biológica de laminación de avenidas. Estos ecosistemas funcionan como una \"esponja\" natural: el suelo poroso y las raíces aumentan la capacidad de infiltración y reducen la velocidad de la escorrentía superficial. Un humedal puede absorber millones de litros de agua durante una tormenta, liberándolos lentamente y evitando el colapso de los sistemas de drenaje artificial.", "Aplicación Práctica en Airbus: En nuestras plantas situadas en zonas costeras o fluviales (como en las cercanías del Garona en Toulouse o el Elba en Hamburgo), el mantenimiento de zonas de inundación natural protege directamente los hangares y las líneas de montaje final (FAL). Esto reduce el riesgo de paradas de producción por daños en equipos críticos y minimiza las primas de seguros por riesgos climáticos.", "Resiliencia Térmica: Termodinámica Vegetal contra la Isla de Calor", "Contexto Histórico: El diseño industrial tradicional priorizó superficies pavimentadas y naves metálicas, lo que genera microclimas extremos conocidos como \"Islas de Calor Urbano/Industrial\", elevando la temperatura local hasta 5°C por encima del entorno rural.", "Justificación Científica: La conservación de cubiertas vegetales maduras utiliza dos procesos físicos clave: la intercepción de radiación (sombra) y la evapotranspiración. Las plantas absorben energía solar para evaporar agua, un proceso endotérmico que enfría activamente el aire circundante. Además, el aumento del albedo (reflexión de la luz) de las zonas verdes frente al asfalto reduce la acumulación de calor latente.", "Aplicación Práctica en Airbus: La integración de cinturones verdes y cubiertas vegetales en nuestros centros logísticos reduce drásticamente la carga térmica sobre los edificios. Esto se traduce en un ahorro directo en los costes energéticos de refrigeración (HVAC) en oficinas y hangares, mejora el confort térmico de los empleados en pista y prolonga la vida útil de los materiales sensibles a la temperatura utilizados en la fabricación de composites."], "figureSrc": "images/m3/m3-apoyo.jpg", "figureLabel": "Mitigación de riesgos físicos"}, {"kicker": "Fuentes", "title": "5. Fuentes y Referencias Científicas", "paragraphs": []}, {"kicker": "5.1", "title": "5.1. Informes y Organismos Internacionales de Referencia", "paragraphs": ["IPBES (2019): Global Assessment Report on Biodiversity and Ecosystem Services. Informe definitivo sobre el estado de la degradación natural global.", "UNEP, Chatham House & CIWF (2021): Food System Impacts on Biodiversity Loss. Análisis del \"paradigma de la comida barata\".", "FAO (2019): The State of the World’s Biodiversity for Food and Agriculture. Reporte sobre la pérdida de agrobiodiversidad y erosión genética.", "EAT-Lancet Commission (2019): Food in the Anthropocene: the EAT-Lancet Commission on healthy diets from sustainable food systems. Definición de la \"Dieta de Salud Planetaria\"."]}, {"kicker": "5.2", "title": "5.2. Literatura Científica de Alto Impacto", "paragraphs": ["Poore, J., & Nemecek, T. (2018): \"Reducing food’s environmental impacts through producers and consumers\", Science. Estudio base sobre la eficiencia del suelo (ahorro del 75%).", "Steffen, W., et al. (2015): \"Planetary boundaries: Guiding human development on a changing planet\", Science. Marco teórico de los límites biofísicos de la Tierra.", "Newbold, T., et al. (2015): \"Global effects of land use on local terrestrial biodiversity\", Nature. Evidencia sobre el impacto de la agricultura en la integridad biológica local.", "Khoury, C. K., et al. (2014): \"Increasing homogeneity in global food supplies and the implications for food security\", PNAS. Análisis de la vulnerabilidad sistémica alimentaria."]}, {"kicker": "5.3", "title": "5.3. Estrategias y Herramientas de Gestión", "paragraphs": ["Project Drawdown (2020): Plant-Rich Diets. Clasificación de la eficiencia alimentaria como una de las soluciones climáticas más potentes.", "World Resources Institute (WRI) (2019): Creating a Sustainable Food Future. Propuestas para alimentar a 10.000 millones de personas sin destruir el planeta.", "TNFD (2023): Recommendations of the Taskforce on Nature-related Financial Disclosures. Marco para la gestión corporativa de dependencias y riesgos naturales."]}, {"kicker": "Resumen", "title": "6. Resumen del Módulo", "paragraphs": ["La eficiencia alimentaria es la palanca más poderosa para liberar el espacio geográfico que la naturaleza necesita para protegernos. Optimizar el uso del suelo significa asegurar que el planeta tenga espacio suficiente para actuar como el sumidero de carbono y el escudo protector que nuestra industria y nuestras infraestructuras necesitan para operar con seguridad."]}]}, {"id": "m4", "index": "04", "title": "¡Súmate al Cambio! Comunidad y Acción Colaborativa", "objective": "Inspirar la participación activa de todos los que formamos Airbus a través de la colaboración, el intercambio de buenos consejos y la unión de personas que impulsan hábitos positivos de forma amena y social.", "duration": "90–110 min", "tag": "Red humana", "theme": {"ink": "#17221c", "panel": "#f7f5ee", "soft": "#dce8df", "line": "#6a9a7b", "accent": "#315645"}, "hero": "images/m4/m4-hero.jpg", "support": "images/m4/m4-apoyo.jpg", "case": "images/m4/m4-caso.jpg", "openingTitle": "Objetivo del Módulo", "openingParagraphs": ["Inspirar la participación activa de todos los que formamos Airbus a través de la colaboración, el intercambio de buenos consejos y la unión de personas que impulsan hábitos positivos de forma amena y social."], "sections": [{"kicker": "Capítulo 4.1", "title": "El Poder de la Red: Personas Comprometidas y Colaboración Local", "paragraphs": []}, {"kicker": "Subcapítulo 4.1.1", "title": "Juntos llegamos más lejos", "paragraphs": ["En Airbus somos miles de personas, y lo mejor que tenemos es nuestro talento para colaborar. El cambio hacia una empresa más conectada con la naturaleza no tiene por qué ser aburrido ni solitario.", "En nuestras plantas y oficinas siempre hay personas comprometidas con el medio ambiente: compañeros que, de forma natural, se juntan para compartir ideas, resolver dudas y lanzar pequeñas iniciativas locales. No necesitan un nombre oficial para marcar la diferencia; lo que les une es la voluntad de mejorar nuestro entorno de trabajo."], "figureSrc": "images/m4/m4-apoyo.jpg", "figureLabel": "Colaboración local"}, {"kicker": "Subcapítulo 4.1.2", "title": "El efecto contagio (del bueno)", "paragraphs": ["¿Sabías que ver a un compañero usar una botella reutilizable o traer un menú saludable motiva más que cualquier cartel en la pared? El liderazgo social se basa en la inspiración mutua. No se trata de juzgar lo que hacen los demás, sino de celebrar los pequeños logros que compartimos. Cuando vemos que alguien da el paso, ¡los demás nos sentimos invitados a sumarnos!"], "figureSrc": "images/m4/m4-caso.jpg", "figureLabel": "Inspiración mutua"}, {"kicker": "Capítulo 4.2", "title": "Consejos Prácticos para un Día a Día con \"Buen Rollo\"", "paragraphs": []}, {"kicker": "Subcapítulo 4.2.1", "title": "Pequeños gestos en la oficina y la planta", "paragraphs": ["Aquí tienes algunos consejos que ya están funcionando gracias a la iniciativa de muchos compañeros:", "El café con charla: Si usas tu propia taza en lugar de vasos desechables, el café sabe mejor y evitamos residuos innecesarios. Es un gesto sencillo que dice mucho de nosotros.", "Digitalización con sentido: Compartir documentos en la nube en lugar de imprimir no solo ahorra papel, sino que facilita el trabajo en equipo y mantiene nuestras mesas despejadas.", "El reto del menú: Si vas a la cafetería con el equipo, ¿qué tal si un día a la semana probamos todos la opción vegetariana? Es la excusa ideal para charlar sobre nuevos sabores y hábitos."], "figureSrc": "images/m4/m4-hero.jpg", "figureLabel": "Pequeños gestos diarios"}, {"kicker": "Subcapítulo 4.2.2", "title": "Movilidad compartida y activa", "paragraphs": ["¿Vives cerca de un compañero? Compartir coche es la oportunidad ideal para conocer gente de otros departamentos, ahorrar y reducir el estrés del tráfico. Y si te animas con la bici, seguro que encuentras a otros compañeros con los que organizar una ruta para llegar juntos."], "figureSrc": "images/m4/m4-apoyo.jpg", "figureLabel": "Movilidad compartida"}, {"kicker": "Capítulo 4.3", "title": "Proyectos que nos Unen: Iniciativas de Compañeros", "paragraphs": []}, {"kicker": "Subcapítulo 4.3.1", "title": "Ideas que hacen piña", "paragraphs": ["El día a día en Airbus también se construye con actividades que nos gustan a todos:", "Rincones de intercambio: Crear espacios donde dejar libros o cosas que ya no usamos para que otros compañeros les den una segunda vida.", "Talleres y encuentros sobre biodiversidad: Aprovechar los espacios verdes de nuestras plantas para conocer mejor la fauna y flora local en ratos de descanso.", "Actividades de voluntariado: Participar juntos en jornadas de limpieza o reforestación ayuda a crear lazos que luego hacen que el ambiente de trabajo sea mucho más cercano y colaborativo."], "figureSrc": "images/m4/m4-caso.jpg", "figureLabel": "Iniciativas de compañeros"}], "practical": {"title": "CONTENIDO PRÁCTICO: ¡Lanza tu Propia Idea!", "intro": "Título de la Actividad: El \"Muro de la Colaboración\".\n\nInstrucciones: Vamos a crear una lluvia de ideas abierta.", "steps": ["Piensa en una pequeña acción que te gustaría proponer a tus compañeros para fomentar la colaboración y cuidar el entorno (ej. \"Tener un punto de intercambio de libros en el área de descanso\").", "Escríbela en el muro compartido.", "¡Apoya las ideas de otros compañeros que te parezcan interesantes!"], "takeaway": "La clave es la conexión entre personas. Cuando algo es auténtico y nace de la colaboración, tiene mucha más fuerza que cualquier etiqueta corporativa."}, "evaluation": {"title": "Pregunta de Reflexión", "question": "¿Qué es lo más valioso para que una iniciativa de este tipo funcione en tu equipo?\n\nA) Que tenga un nombre oficial y un logo.\n\nB) Que nazca de personas con ganas de colaborar y sea fácil de poner en marcha entre compañeros. (Respuesta Correcta)\n\nC) Que sea obligatoria por contrato.", "answer": "Feedback: ¡Exacto! La clave es la conexión entre personas. Cuando algo es auténtico y nace de la colaboración, tiene mucha más fuerza que cualquier etiqueta corporativa."}, "closing": "La participación, el intercambio de ideas y la colaboración cotidiana pueden transformar el entorno de trabajo de forma cercana, positiva y compartida."}, {"id": "m5", "index": "05", "title": "Transparencia, Estándares de Reporte y Prevención del Greenwashing", "objective": "Capacitar a los empleados para identificar y evitar el greenwashing, comprendiendo cómo los esfuerzos de sostenibilidad se respaldan con datos científicos y marcos de reporte internacionales, garantizando una comunicación corporativa ética, auténtica y resistente al escrutinio externo.", "duration": "100–120 min", "tag": "Integridad del dato", "theme": {"ink": "#1a1823", "panel": "#f8f5fb", "soft": "#e8def4", "line": "#8b68b7", "accent": "#463065"}, "hero": "images/m5/m5-hero.jpg", "support": "images/m5/m5-apoyo.jpg", "case": "images/m5/m5-caso.jpg", "openingTitle": "Objetivo del Módulo", "openingParagraphs": ["Capacitar a los empleados para identificar y evitar el greenwashing, comprendiendo cómo los esfuerzos de sostenibilidad se respaldan con datos científicos y marcos de reporte internacionales, garantizando una comunicación corporativa ética, auténtica y resistente al escrutinio externo."], "sections": [{"kicker": "Capítulo", "title": "CAPÍTULO 5.1: La Anatomía del Greenwashing", "paragraphs": []}, {"kicker": "Subcapítulo 5.1.1", "title": "¿Qué es realmente el Greenwashing?", "paragraphs": ["En el sector aeroespacial, el greenwashing no solo es un problema de imagen; es un riesgo de cumplimiento legal y financiero. Se define como el acto de inducir a error a los grupos de interés (empleados, inversores, clientes) respecto a las prácticas ambientales de una empresa o los beneficios ambientales de un producto o servicio.", "Cómo identificarlo:", "Afirmaciones vagas: Uso de términos como \"vuelo verde\", \"avión eco-friendly\" o \"limpio\" sin definir métricas específicas.", "Falta de prueba: Anunciar objetivos de descarbonización sin detallar la hoja de ruta técnica o la inversión asignada.", "Compensaciones irrelevantes: Centrar la comunicación en acciones puramente simbólicas o de marketing (como regalar bolígrafos de bambú en ferias comerciales o lanzar una campaña sobre el uso de posavasos de corcho en eventos corporativos) mientras se elude informar sobre el impacto sistémico de la cadena de suministro o la huella hídrica industrial."], "figureSrc": "images/m5/m5-apoyo.jpg", "figureLabel": "Anatomía del greenwashing"}, {"kicker": "Subcapítulo 5.1.2", "title": "El valor de la transparencia: La \"Cultura del Dato\"", "paragraphs": ["En Airbus, la honestidad sobre los desafíos técnicos genera más confianza que el optimismo ciego. Admitir que la descarbonización total de la aviación es uno de los retos de ingeniería más difíciles de la historia de la humanidad no es una debilidad; es una muestra de integridad.", "La transparencia implica reportar tanto los logros como los obstáculos, reconociendo que los objetivos de sostenibilidad son un camino de mejora continua y no un destino publicitario."], "figureSrc": "images/m5/m5-caso.jpg", "figureLabel": "Cultura del dato"}, {"kicker": "Capítulo", "title": "CAPÍTULO 5.2: El Respaldo Científico de las Metas de Airbus", "paragraphs": []}, {"kicker": "Subcapítulo 5.2.1", "title": "Compromisos basados en la ciencia (SBTi y TCFD)", "paragraphs": ["Para que las metas de Airbus no sean percibidas como greenwashing, se alinean con estándares internacionales rigurosos:", "SBTi (Science Based Targets initiative): Airbus se ha comprometido a que sus objetivos de reducción de emisiones estén validados científicamente para asegurar que son compatibles con el límite de 1.5°C del Acuerdo de París. No son metas \"deseadas\", son metas necesarias según la física del clima.", "TCFD (Task Force on Climate-related Financial Disclosures): Este marco nos obliga a divulgar cómo los riesgos climáticos (vistos en el Módulo 1) afectan a nuestra estabilidad financiera. Es la forma de decir a los inversores que somos conscientes de los riesgos y estamos preparados."], "figureSrc": "images/m5/m5-hero.jpg", "figureLabel": "Respaldo científico de las metas"}, {"kicker": "Subcapítulo 3.2.2", "title": "Estándares Globales (GRI) y Alcance 3", "paragraphs": ["El uso de estándares como el GRI (Global Reporting Initiative) permite que cualquier auditor externo pueda comparar nuestro desempeño de forma objetiva.", "El gran reto actual y futuro es la transparencia en el Alcance 3 (Scope 3). Al reportar de forma honesta las emisiones indirectas y los impactos en la biodiversidad de nuestra cadena de suministro, protegemos a Airbus contra acusaciones de ocultar información y construimos una reputación basada en la realidad operativa, no en la narrativa."], "figureSrc": "images/m5/m5-apoyo.jpg", "figureLabel": "GRI y Alcance 3"}, {"kicker": "Contenido teórico", "title": "CONTENIDO TEÓRICO: Casos de Estudio y Política Ambiental", "paragraphs": []}, {"kicker": "Lectura", "title": "Cuando el Marketing choca con la Realidad (Casos Reales)", "paragraphs": ["Para entender la gravedad del greenwashing, analizamos tres casos judiciales y regulatorios que han marcado un precedente en la industria aérea:", "Caso KLM (Países Bajos, 2024): Un tribunal neerlandés dictaminó que la campaña \"Fly Responsibly\" de KLM era engañosa. La aerolínea sugería que sus vuelos eran \"sostenibles\" o estaban \"en camino a la sostenibilidad\" basándose en el uso marginal de SAF y la compensación de carbono mediante reforestación. El juez determinó que estas medidas son insuficientes para justificar tales afirmaciones, creando una falsa impresión de que volar no daña el medio ambiente.", "Caso Delta Air Lines (EE.UU., 2023): Delta se enfrenta a una demanda colectiva en California por su afirmación de ser la \"primera aerolínea neutra en carbono del mundo\". La demanda alega que Delta dependía excesivamente de créditos de carbono de baja calidad y metodologías de compensación cuestionables que no representan una reducción real de emisiones en la atmósfera.", "Caso Etihad Airways (Reino Unido, 2023): La Autoridad de Normas Publicitarias (ASA) prohibió anuncios de Etihad que afirmaban que la aerolínea estaba comprometida con la \"defensa del medio ambiente\". La autoridad consideró que los términos eran demasiado amplios y que la aerolínea no proporcionó pruebas suficientes de que sus operaciones no dañaban el entorno de manera significativa.", "Lección aprendida: La precisión terminológica es vital. En Airbus, preferimos hablar de \"reducción de impacto\" o \"transición energética\" antes que de \"vuelo neutro\", ya que refleja mejor la realidad técnica actual."], "figureSrc": "images/m5/m5-caso.jpg", "figureLabel": "Casos reales de greenwashing"}], "practical": {"title": "CONTENIDO PRÁCTICO: Taller de \"Auditoría de Comunicación\"", "intro": "Título de la Actividad: Detector de Greenwashing.\n\nInstrucciones: A continuación se presenta un borrador ficticio de una nota de prensa interna. Tu misión es identificar los errores de comunicación y reescribirlo para que sea una comunicación ética y basada en datos.\n\nTexto a Auditar:\n\n\"Estamos orgullosos de lanzar el proyecto 'Airbus Futuro'. Gracias a la entrega de kits de semillas a los empleados en el Día de la Tierra, hemos compensado nuestra huella operativa y nos convertimos en una empresa 100% natural y libre de impacto. Somos la solución definitiva para un cielo sin rastro ambiental.\"", "steps": ["Desafío para el alumno:", "Identifica 3 errores de greenwashing: (Ej. \"100% natural\" es una afirmación vaga; los kits de semillas son una compensación irrelevante frente al impacto industrial; \"libre de rastro\" es una falsedad técnica).", "Reescribe el mensaje: Utiliza datos concretos (porcentaje real de reducción de emisiones, inversión en SAF, hitos verificables del programa ZEROe)."], "takeaway": "La validación externa y el rigor en el dato son el único \"antídoto\" real contra el greenwashing."}, "evaluation": {"title": "Pregunta de Evaluación Final", "question": "¿Cuál es la mejor defensa de Airbus contra las acusaciones de greenwashing?\n\nA) Hacer campañas de publicidad con muchas imágenes de naturaleza.\n\nB) Someter nuestras metas a la validación de organismos científicos externos como SBTi y reportar datos verificables bajo estándares internacionales. (Respuesta Correcta)\n\nC) Decir que somos mejores que la competencia en sostenibilidad.", "answer": "Feedback: ¡Correcto! La validación externa y el rigor en el dato son el único \"antídoto\" real contra el greenwashing."}, "closing": "La comunicación corporativa ética no se basa en grandes afirmaciones, sino en precisión terminológica, datos verificables y marcos científicos que puedan resistir escrutinio externo."}]};

function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function parseSectionHeading(rawTitle,kicker){
  const colonIndex = rawTitle.indexOf(':');
  const prefix = colonIndex >= 0 ? rawTitle.slice(0, colonIndex).trim() : '';
  const rest = colonIndex >= 0 ? rawTitle.slice(colonIndex + 1).trim() : rawTitle;
  let cleanPrefix = prefix;
  const dotSpaceIndex = cleanPrefix.indexOf('. ');
  if(dotSpaceIndex>0){
    const maybeNumber = cleanPrefix.slice(0,dotSpaceIndex);
    const isOnlyDigits = [...maybeNumber].every(ch=>ch>='0'&&ch<='9');
    if(isOnlyDigits) cleanPrefix = cleanPrefix.slice(dotSpaceIndex+2);
  }
  if(cleanPrefix.toUpperCase().startsWith('CAPÍTULO ')) return {eyebrow:cleanPrefix.toUpperCase(), title:rest, isChapter:true};
  const isNumbered = prefix.length>0 && [...prefix].every(ch=>(ch>='0'&&ch<='9')||ch==='.');
  if(isNumbered) return {eyebrow:prefix,title:rest,isChapter:false};
  return {eyebrow:String(kicker||'').toUpperCase(), title:rawTitle, isChapter:String(kicker||'').toUpperCase()==='CAPÍTULO'};
}
function splitLeadText(text){const i=text.indexOf(':'); return i>0 && i<95 ? {lead:text.slice(0,i+1),rest:text.slice(i+1).trim()} : {lead:'',rest:text};}
function figureHtml(src,label,tone,tall=false){
  const cls = tall ? 'media' : 'media short';
  return `<div class="${cls}" style="border-color:${tone.line};background:${tone.soft}"><img src="${esc(src)}" alt="${esc(label)}" onerror="this.parentElement.innerHTML=window.figureFallback('${esc(label)}','${esc(tone.line)}','${esc(tone.soft)}','${esc(tone.panel)}')"><div class="label">${esc(label)}</div></div>`;
}
window.figureFallback=(label,line,soft,panel)=>`<div class="media short" style="border-color:${line};background:linear-gradient(135deg,${soft} 0%, #fff 55%, ${panel} 100%)"><div class="fallback"><div class="fallback-inner"><div class="ficon"></div><div class="label">${label}</div></div></div></div>`;
function renderParagraph(paragraph,accent){
  const trimmed = String(paragraph||'').trim(); if(!trimmed) return '';
  if(trimmed.startsWith('* ')){
    const parts=splitLeadText(trimmed.slice(2).trim());
    return `<div class="highlight"><div class="leadrow"><div class="dot" style="background:${accent}"></div><p>${parts.lead?`<strong>${esc(parts.lead)}</strong> `:''}${esc(parts.rest)}</p></div></div>`;
  }
  const isLetteredHeading = /^[A-Z]\.\s/.test(trimmed);
  if(isLetteredHeading) return `<div class="box-title">${esc(trimmed)}</div>`;
  const dotSpaceIndex = trimmed.indexOf('. ');
  if(dotSpaceIndex>0){
    const maybeNumber = trimmed.slice(0,dotSpaceIndex);
    const isOnlyDigits = [...maybeNumber].every(ch=>ch>='0'&&ch<='9');
    if(isOnlyDigits){
      const parts=splitLeadText(trimmed.slice(dotSpaceIndex+2));
      return `<div class="numbox"><div class="numrow"><div class="numbadge" style="background:${accent}18;color:${accent}">${esc(maybeNumber)}</div><p>${parts.lead?`<strong>${esc(parts.lead)}</strong> `:''}${esc(parts.rest)}</p></div></div>`;
    }
  }
  if(trimmed.endsWith(':')) return `<div class="box-title">${esc(trimmed)}</div>`;
  const parts=splitLeadText(trimmed); const hasLead=!!parts.lead && parts.lead.length<80;
  if(hasLead) return `<div class="highlight"><div class="leadrow"><div class="dot" style="background:${accent}"></div><p><strong>${esc(parts.lead)}</strong> ${esc(parts.rest)}</p></div></div>`;
  return `<div class="para"><p>${esc(trimmed)}</p></div>`;
}
function homeHtml(){
  const c=DATA.course, mods=DATA.modules;
  return `<section class="grid-home"><div class="hero"><div class="hero-grid"><div class="hero-copy"><div class="chips"><span class="chip">Biodiversidad y sostenibilidad</span></div><div style="height:20px"></div><h1>Biodiversidad,<br>sostenibilidad<br>y criterio técnico.</h1><p>${esc(c.intro)}</p><button class="cta" onclick="goProgram()">Abrir programa →</button></div><div class="map hero-map"><div class="eyebrow">Mapa del curso</div>${mods.map(m=>`<div class="map-card"><div class="map-line"><div class="map-badge">${icons[m.id]||'•'}</div><div><div class="eyebrow" style="color:rgba(255,255,255,.45)">${esc(m.index)}</div><div style="margin-top:4px;font-size:14px;line-height:1.6;color:rgba(255,255,255,.88)">${esc(m.title)}</div></div></div></div>`).join('')}</div></div></div><div class="side-card"><div class="eyebrow">Estructura</div><h2 style="margin:12px 0 0;font-size:36px;line-height:1.02;letter-spacing:-.02em;color:#1a1d23">Cómo está organizado</h2><div style="margin-top:24px;display:grid;gap:12px">${c.structure.map((item,i)=>`<div class="small-card"><div style="display:flex;gap:12px;align-items:flex-start"><div class="counter">0${i+1}</div><p style="margin:0;font-size:14px;line-height:2;color:#475569">${esc(item)}</p></div></div>`).join('')}</div></div></section>`;
}
function programHtml(){
  const mods=DATA.modules;
  return `<section class="program-header"><div class="eyebrow">Programa</div><h1>Recorrido del curso</h1><p style="max-width:850px;font-size:16px;line-height:2;color:#475569">Cinco módulos temáticos con teoría desarrollada, caso o dinámica aplicada y evaluación breve con feedback técnico.</p></section><div style="height:24px"></div><section class="program-list">${mods.map(m=>{
      return `<article class="program-card"><div class="program-grid"><div class="media-wrap" style="background:${m.theme.panel}">${figureHtml(m.hero,`${m.index} · hero`,m.theme,true)}</div><div class="program-body"><div class="p-top"><div style="display:flex;gap:12px;align-items:center"><div class="module-icon" style="background:${m.theme.soft}">${icons[m.id]||'•'}</div><div><div class="eyebrow">Módulo ${esc(m.index)}</div><div style="margin-top:4px;font-size:14px;color:#64748b">${esc(m.duration)}</div></div></div><span class="tag" style="background:${m.theme.soft};color:${m.theme.accent}">${esc(m.tag)}</span></div><h3>${esc(m.title)}</h3><p>${esc(m.objective)}</p><div class="section-preview">${m.sections.slice(0,4).map(s=>{const h=parseSectionHeading(s.title,s.kicker);return `<div class="section-box"><div class="eyebrow">${esc(h.eyebrow)}</div><div style="margin-top:8px;font-size:14px;line-height:1.7;color:#1f2937;font-weight:500">${esc(h.title)}</div></div>`}).join('')}</div><div style="margin-top:24px;display:flex;flex-wrap:wrap;gap:12px;align-items:center"><button class="open-btn" style="background:${m.theme.accent}" onclick="openModule('${m.id}')">Abrir módulo →</button><span style="font-size:14px;color:#64748b">Teoría extensa · caso aplicado · autoevaluación</span></div></div></div></article>`
    }).join('')}</section>`;
}
function articleHtml(section,module){
  const h=parseSectionHeading(section.title,section.kicker);
  const paras=(section.paragraphs||[]).map(p=>renderParagraph(p,module.theme.accent)).join('');
  if(h.isChapter) return `<section class="article-card"><div class="chapter-head" style="border-color:${module.theme.accent};background:${module.theme.panel}"><div class="eyebrow" style="color:${module.theme.accent}">${esc(h.eyebrow)}</div><h3 style="margin:12px 0 0;font-size:30px;line-height:1.08;letter-spacing:-.02em;color:#1b1e25">${esc(h.title)}</h3></div>${section.paragraphs&&section.paragraphs.length?`<div class="article-content"><div class="block-list">${paras}</div>${section.figureSrc?`<div style="margin-top:24px">${figureHtml(section.figureSrc,section.figureLabel||'Apoyo visual',module.theme,true)}</div>`:''}</div>`:''}</section>`;
  return `<section class="article-card"><div class="article-grid"><div class="article-side" style="background:${module.theme.soft}"><div><div class="eyebrow">Sección</div><div style="margin-top:8px;font-size:24px;font-weight:700;color:${module.theme.accent}">${esc(h.eyebrow)}</div></div></div><div class="article-content"><h3>${esc(h.title)}</h3><div class="block-list">${paras}</div>${section.figureSrc?`<div style="margin-top:24px">${figureHtml(section.figureSrc,section.figureLabel||'Apoyo visual',module.theme,true)}</div>`:''}</div></div></section>`;
}
function practicalHtml(module){ if(!module.practical) return ''; const p=module.practical; return `<section class="article-card"><div class="article-grid"><div class="article-side" style="background:${module.theme.soft}"><div><div style="font-size:18px;color:${module.theme.accent}">🗂️</div><div class="eyebrow" style="margin-top:12px">Práctica</div></div></div><div class="article-content"><h3>${esc(p.title)}</h3><p style="white-space:pre-line;font-size:16px;line-height:2;color:#475569">${esc(p.intro)}</p><div class="practical-steps">${p.steps.map((s,i)=>`<div class="section-box"><div class="eyebrow">Paso 0${i+1}</div><p style="margin:8px 0 0;font-size:14px;line-height:2;color:#475569">${esc(s)}</p></div>`).join('')}</div><div style="margin-top:20px" class="highlight"><p><strong>Lección:</strong> ${esc(p.takeaway)}</p></div></div></div></section>`; }
function evaluationHtml(module){ if(!module.evaluation) return ''; const e=module.evaluation; return `<section class="article-card"><div class="article-grid"><div class="article-side" style="background:${module.theme.soft}"><div><div style="font-size:18px;color:${module.theme.accent}">📝</div><div class="eyebrow" style="margin-top:12px">Evaluación</div></div></div><div class="article-content"><h3>${esc(e.title)}</h3><div class="section-box" style="margin-top:20px"><div class="eyebrow">Pregunta</div><p style="margin:12px 0 0;white-space:pre-line;font-size:16px;line-height:2;color:#334155">${esc(e.question)}</p></div><div style="margin-top:16px" class="highlight"><div class="leadrow"><div style="font-size:18px;line-height:1;color:${module.theme.accent}">✔</div><p>${esc(e.answer)}</p></div></div></div></div></section>`; }
function moduleHtml(module){
  const nextIndex=DATA.modules.findIndex(x=>x.id===module.id)+1;
  const next=DATA.modules[nextIndex]||null;
  return `<div class="module-layout"><aside class="sticky stack"><div class="meta-dark"><div style="display:flex;gap:12px;align-items:center"><div class="module-icon" style="border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.05)">${icons[module.id]||'•'}</div><div><div class="eyebrow" style="color:rgba(255,255,255,.45)">Módulo ${esc(module.index)}</div><div style="margin-top:4px;font-size:14px;color:rgba(255,255,255,.65)">${esc(module.duration)}</div></div></div><h2 style="margin:20px 0 0;font-size:28px;line-height:1.08;color:#f8f3ec">${esc(module.title)}</h2><p style="font-size:14px;line-height:2;color:rgba(255,255,255,.7)">${esc(module.objective)}</p><div style="margin-top:20px"><span class="chip">${esc(module.tag)}</span></div></div></aside><div class="stack"><section class="article-card"><div class="program-grid" style="grid-template-columns:1.05fr .95fr"><div style="padding:24px 32px;background:${module.theme.panel}"><div class="eyebrow">Apertura del módulo</div><h1 style="margin:12px 0 0;max-width:900px;font-size:58px;line-height:.98;letter-spacing:-.04em;color:#1b1e25">${esc(module.title)}</h1>${module.openingTitle&&module.openingParagraphs?`<h2 style="margin:24px 0 0;font-size:32px;line-height:1.08;letter-spacing:-.02em;color:#1b1e25">${esc(module.openingTitle)}</h2><div class="block-list" style="margin-top:16px">${module.openingParagraphs.map(p=>renderParagraph(p,module.theme.accent)).join('')}</div>`:`<p style="margin-top:20px;font-size:16px;line-height:2;color:#475569">${esc(module.objective)}</p>`}</div><div class="media-wrap" style="background:${module.theme.soft}">${figureHtml(module.hero,`${module.index} · hero`,module.theme,true)}</div></div></section>${module.sections.map(s=>articleHtml(s,module)).join('')}${practicalHtml(module)}${evaluationHtml(module)}${module.closing?`<section class="footer-close"><div class="eyebrow" style="color:rgba(255,255,255,.45)">Cierre</div><p style="margin:16px 0 0;font-size:16px;line-height:2;color:rgba(255,255,255,.78)">${esc(module.closing)}</p></section>`:''}<section class="meta-white"><div class="eyebrow">Navegación</div><div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;align-items:center"><button class="small-card" style="padding:12px 16px;text-align:left" onclick="goProgram()">← Programa</button>${next?`<button class="open-btn" style="background:#020617;justify-content:center" onclick="openModule('${next.id}')">Siguiente →</button>`:''}</div></section></div></div>`;
}
function setActiveNav(){ qs('#nav-home').classList.toggle('active',state.view==='home'); qs('#nav-program').classList.toggle('active',state.view==='program'||state.view.startsWith('m')); }
function render(){
  qs('#brand-title').textContent=DATA.course.title; qs('#brand-sub').textContent=DATA.course.subtitle;
  qs('#home-view').innerHTML=homeHtml();
  qs('#program-view').innerHTML=programHtml();
  qs('#module-view').innerHTML=state.currentModule?moduleHtml(state.currentModule):'';
  qs('#home-view').classList.toggle('hidden',state.view!=='home');
  qs('#program-view').classList.toggle('hidden',state.view!=='program');
  qs('#module-view').classList.toggle('hidden',!state.currentModule);
  setActiveNav();
  window.scrollTo({top:0,behavior:'smooth'});
}
function goHome(){state.view='home'; state.currentModule=null; render();}
function goProgram(){state.view='program'; state.currentModule=null; render();}
function openModule(id){ const m=DATA.modules.find(x=>x.id===id); state.view=id; state.currentModule=m||null; render(); }
window.goHome=goHome; window.goProgram=goProgram; window.openModule=openModule;
qs('#nav-home').onclick=goHome; qs('#nav-program').onclick=goProgram;
render();
</script>
</body>
</html>
